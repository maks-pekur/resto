version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      nx:
        patterns:
          - "nx"
          - "@nx/*"
      typescript-eslint:
        patterns:
          - "@typescript-eslint/*"
          - "typescript-eslint"
          - "eslint"
          - "eslint-*"
      types:
        patterns:
          - "@types/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday

  - package-ecosystem: docker
    directory: /infra/docker
    schedule:
      interval: weekly
      day: monday
